# ══════════════════════════════════════════════════════════════
#  XDART-Φ × XHEART — Nginx Reverse Proxy Configuration
#
#  Replace YOUR_DOMAIN with your actual domain name.
#  SSL certificates are managed by Certbot (Let's Encrypt).
# ══════════════════════════════════════════════════════════════

# Rate limiting zone — protect against abuse
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=pipeline:10m rate=1r/m;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Max upload size (for file analysis endpoints)
    client_max_body_size 10M;

    # ── Main UI ──
    location / {
        proxy_pass http://xdart:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API endpoints (rate limited) ──
    location /xdart/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://xdart:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for pipeline execution (can take 5-10 min)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Pipeline execution (strict rate limit — 1 per minute) ──
    location /xdart/run {
        limit_req zone=pipeline burst=2 nodelay;
        proxy_pass http://xdart:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
    }

    # ── SSE streaming (no buffering for real-time events) ──
    location /xdart/stream {
        proxy_pass http://xdart:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 900s;
    }

    # ── SSE notifications stream ──
    location /xdart/notifications/stream {
        proxy_pass http://xdart:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;  # Keep alive 24h
    }

    # ── Health check (no rate limit) ──
    location /xdart/health {
        proxy_pass http://xdart:8000;
        access_log off;
    }
}
